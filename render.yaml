services:
  - type: web
    name: skillledger
    env: python
    region: oregon
    plan: free
    buildCommand: npm install --prefix client && npm run build --prefix client && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: GITHUB_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 10000